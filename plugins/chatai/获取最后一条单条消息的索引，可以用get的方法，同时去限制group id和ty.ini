获取最后一条单条消息的索引，可以用get的方法，同时去限制group id和type这个元数据字段，
因为这个每个聊群可以存在的单条数据不大于10，所以之后就可以遍历它来查找这个索引的最大值。
然后获取消息快的索引的话，也是使用get的方法，但是这里要同时的限制group id, type和is_locked的三个字段。但是如果仅仅只是这样的话，他返回的返回的记录返回的结果会很多，
再去遍历的话成本就太高了。所以说啊，可以这样子，每次在创建消息块的时候就直接去查找之前已经生成的消息块，把这个消息块前面的第2个消息块给锁上。
之后之后经过过滤的话，那么它的这个。过滤之后获取的结果他也不会很多，也就三个。